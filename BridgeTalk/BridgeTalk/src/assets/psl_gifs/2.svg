<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0f1724;stop-opacity:1"/>
    </radialGradient>
    <style>
      .hand { font-size: 52px; }
      .letter { font-size: 18px; font-weight: bold; font-family: monospace; }
      @keyframes pulse {
        0%,100% { transform: scale(1) translateY(0); }
        50% { transform: scale(1.08) translateY(-3px); }
      }
      .anim { animation: pulse 1.5s ease-in-out infinite; transform-origin: 60px 55px; }
    </style>
  </defs>
  <rect width="120" height="120" rx="12" fill="url(#bg2)"/>
  <rect width="120" height="120" rx="12" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.4"/>
  <g class="anim">
    <text x="60" y="68" text-anchor="middle" class="hand">🖐</text>
  </g>
  <text x="60" y="108" text-anchor="middle" class="letter" fill="#06b6d4">2</text>
</svg>